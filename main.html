<body id="main_page_bg"

    <div class="bento_background">
        <div class="bento_box">
            <div class="bento_item element1"> under_construction </div>

            <div class="bento_item music_player" id="music_player_bg">

                    <div class="song_name" id="title">
                        Title
                    </div>
                    <div class="artist_name" id = "artist">
                        UnknownArtist
                    </div>
                </div>

                <div class="buttons">
                    <div class="previous_button">
                        ⏮
                    </div>
                    <div class="pause_play_button">
                        ⏸
                    </div>
                    <div class="skip_button">
                        ⏭
                    </div>
                </div>
            </div>

            <div class="about_me">
                <h1>
                    <br>HELLO WORLD!<br>

                </h1>
                <div class="circle">

                        style="border-radius: 100%;">
                </div>
                <div class="date_clock_container">
                    <div class="day_name" id="day">Weekday</div>
                    <div class="calendar" id="calendar">
                        00 Month 0000
                    </div>
                    <div class="clock" id="clock">
                        00:00:00
                    </div>
                </div>
            </div>

            <div class="bento_item interests"> under_construction </div>
            <div class="bento_item element5"> under_construction </div>
